name: Scrape & Deploy

on:
  schedule:
    # Runs on the 1st of every month at 02:00 UTC
    - cron: "0 2 1 * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    name: Incremental Scrape
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scraper/package.json

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm install

      - name: Install Playwright browsers
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Run incremental scrape
        working-directory: scraper
        run: npm run scrape

      - name: Check if theses.json changed
        id: check
        run: |
          if git diff --quiet theses.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new theses found."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New theses found!"
          fi

      - name: Commit updated theses.json
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add theses.json
          git commit -m "chore: update theses.json [$(date +'%Y-%m-%d')]"
          git push

  deploy:
    name: Build & Deploy to GitHub Pages
    needs: scrape
    if: needs.scrape.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
